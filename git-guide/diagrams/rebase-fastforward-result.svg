<svg viewBox="0 0 900 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .commit-circle { fill: #FFD700; stroke: #DAA520; stroke-width: 2; }
      .commit-text { font-family: monospace; font-size: 12px; text-anchor: middle; dominant-baseline: middle; font-weight: bold; }
      .branch-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; }
      .branch-main { fill: #0066CC; }
      .branch-feature { fill: #22C55E; }
      .arrow-main { stroke: #0066CC; stroke-width: 2.5; fill: none; }
    </style>
    <marker id="arrowhead-main" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0066CC" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="20" style="font-size: 16px; font-weight: bold; text-anchor: middle; font-family: sans-serif;">After Rebase + Fast-Forward Merge</text>

  <!-- Linear commits -->
  <circle cx="60" cy="80" r="16" class="commit-circle"/>
  <text x="60" y="80" class="commit-text">C1</text>

  <circle cx="140" cy="80" r="16" class="commit-circle"/>
  <text x="140" y="80" class="commit-text">C2</text>

  <circle cx="220" cy="80" r="16" class="commit-circle"/>
  <text x="220" y="80" class="commit-text">C3</text>

  <circle cx="300" cy="80" r="16" class="commit-circle"/>
  <text x="300" y="80" class="commit-text">C6</text>

  <circle cx="380" cy="80" r="16" class="commit-circle"/>
  <text x="380" y="80" class="commit-text">C4'</text>

  <circle cx="460" cy="80" r="16" class="commit-circle"/>
  <text x="460" y="80" class="commit-text">C5'</text>

  <!-- Arrows -->
  <path d="M 76 80 L 124 80" class="arrow-main" marker-end="url(#arrowhead-main)"/>
  <path d="M 156 80 L 204 80" class="arrow-main" marker-end="url(#arrowhead-main)"/>
  <path d="M 236 80 L 284 80" class="arrow-main" marker-end="url(#arrowhead-main)"/>
  <path d="M 316 80 L 364 80" class="arrow-main" marker-end="url(#arrowhead-main)"/>
  <path d="M 396 80 L 444 80" class="arrow-main" marker-end="url(#arrowhead-main)"/>

  <!-- Branch labels -->
  <rect x="470" y="105" width="140" height="25" rx="4" fill="#0066CC" opacity="0.15"/>
  <text x="540" y="122" text-anchor="middle" class="branch-label branch-main">main, feature/new</text>

  <!-- Annotation -->
  <text x="60" y="135" style="font-size: 12px; fill: #666; font-family: sans-serif;">Linear history, clean commit graph</text>
</svg>