site_name: Comprehensive Git Guide
site_description: A practical guide to Git from installation through advanced workflows
site_author: Your Team
site_url: https://roymatsunaga.github.io/git-guide/

theme:
  name: material
  palette:
    scheme: light
    primary: blue
    accent: green
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - 1. Concepts: 01-concepts.md
  - 2. Installation: 02-installation.md
  - 3. Basic Workflow: 03-basics.md
  - 4. Branching & Merging: 04-branching.md
  - 5. Advanced Features: 05-advanced.md
  - 6. Collaboration: 06-collaboration.md
  - 7. Troubleshooting: 07-troubleshooting.md
  - 8. Command Reference: 08-reference.md
  - 9. Visual Guide: 09-visual-guide.md

docs_dir: 'git-guide'
site_dir: 'site'

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

plugins:
  - search
